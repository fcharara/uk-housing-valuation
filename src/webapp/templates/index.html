<!DOCTYPE html>
<html>
<head>
    <title>UK Housing Valuation Model</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #333; }
        .container { max-width: 600px; margin: 60px auto; background: white; border-radius: 12px; padding: 40px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
        h1 { color: #1a365d; margin-bottom: 8px; font-size: 28px; }
        .subtitle { color: #666; margin-bottom: 30px; font-size: 14px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; color: #1a365d; }
        select, input[type="number"] { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 15px; margin-bottom: 20px; }
        select:focus, input:focus { outline: none; border-color: #2b6cb0; box-shadow: 0 0 0 3px rgba(43,108,176,0.1); }
        button { width: 100%; padding: 14px; background: #2b6cb0; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; }
        button:hover { background: #1a365d; }
        .row { display: flex; gap: 16px; }
        .row > div { flex: 1; }
        .footer { text-align: center; margin-top: 20px; font-size: 12px; color: #999; }
    </style>
</head>
<body>
<div class="container">
    <h1>UK Housing Price Predictor</h1>
    <p class="subtitle">Multi-dimensional valuation model — England, 2015–2024</p>
    <form action="/predict" method="post">
        <div class="row">
            <div>
                <label>Property Type</label>
                <select name="property_type">
                    <option value="D">Detached</option>
                    <option value="S">Semi-Detached</option>
                    <option value="T">Terraced</option>
                    <option value="F">Flat / Maisonette</option>
                </select>
            </div>
            <div>
                <label>Energy Rating</label>
                <select name="energy_rating">
                    <option value="A">A</option>
                    <option value="B">B</option>
                    <option value="C" selected>C</option>
                    <option value="D">D</option>
                    <option value="E">E</option>
                    <option value="F">F</option>
                    <option value="G">G</option>
                </select>
            </div>
        </div>
        <div class="row">
            <div>
                <label>Floor Area (m²)</label>
                <input type="number" name="floor_area" value="85" min="10" max="500">
            </div>
            <div>
                <label>Number of Rooms</label>
                <input type="number" name="num_rooms" value="4" min="1" max="20">
            </div>
        </div>
        <label>Region</label>
        <select name="region">
            {% for r in regions %}
            <option value="{{ r }}">{{ r }}</option>
            {% endfor %}
        </select>
        <button type="submit">Predict Price</button>
    </form>
    <p class="footer">XGBoost model with SHAP explanations · Capstone Project 2025</p>
</div>
</body>
</html>
